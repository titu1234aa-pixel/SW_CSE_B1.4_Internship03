<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registration Form</title>
<style>
  :root {
    --bg: #12181f;
    --surface: #1b232c;
    --border: #2b3540;
    --text: #e6ebf0;
    --muted: #9aa7b4;
    --accent: #4fd1c5;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    display: flex;
    justify-content: center;
    padding: 3rem 1rem;
  }

  form {
    width: 100%;
    max-width: 480px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 2rem;
  }

  h1 {
    font-size: 1.5rem;
    margin-top: 0;
    margin-bottom: 1.5rem;
    text-align: center;
  }

  fieldset {
    border: 1px solid var(--border);
    border-radius: 8px;
    margin-bottom: 1.25rem;
    padding: 1rem 1.25rem 1.25rem;
  }

  legend {
    padding: 0 0.5rem;
    color: var(--muted);
    font-size: 0.9rem;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }

  .field {
    margin-bottom: 1rem;
  }

  .field:last-child {
    margin-bottom: 0;
  }

  label {
    display: block;
    font-size: 0.9rem;
    margin-bottom: 0.35rem;
    color: var(--muted);
  }

  input[type="text"],
  input[type="email"],
  input[type="password"],
  input[type="date"],
  input[type="file"],
  select,
  textarea {
    width: 100%;
    padding: 0.6rem 0.7rem;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--bg);
    color: var(--text);
    font-size: 0.95rem;
    font-family: inherit;
  }

  textarea {
    resize: vertical;
    min-height: 90px;
  }

  input:focus-visible,
  select:focus-visible,
  textarea:focus-visible {
    outline: 2px solid var(--accent);
    outline-offset: 1px;
  }

  .radio-group,
  .checkbox-group {
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
  }

  .radio-group label,
  .checkbox-group label {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    color: var(--text);
    font-size: 0.95rem;
    margin-bottom: 0;
  }

  .radio-group input,
  .checkbox-group input {
    width: auto;
  }

  small.hint {
    display: block;
    color: var(--muted);
    font-size: 0.8rem;
    margin-top: 0.3rem;
  }

  button {
    width: 100%;
    padding: 0.75rem;
    border: none;
    border-radius: 6px;
    background: var(--accent);
    color: #0b1116;
    font-weight: 600;
    font-size: 1rem;
    cursor: pointer;
  }

  button:hover {
    filter: brightness(0.95);
  }

  #formStatus {
    text-align: center;
    margin-top: 1rem;
    font-size: 0.9rem;
    color: var(--accent);
  }
</style>
</head>
<body>

<form id="registrationForm" novalidate>
  <h1>Create an Account</h1>

  <fieldset>
    <legend>Account details</legend>

    <div class="field">
      <label for="fullName">Full name</label>
      <input type="text" id="fullName" name="fullName" placeholder="Jane Doe" required minlength="2">
    </div>

    <div class="field">
      <label for="email">Email address</label>
      <input type="email" id="email" name="email" placeholder="jane@example.com" required>
    </div>

    <div class="field">
      <label for="password">Password</label>
      <input type="password" id="password" name="password" placeholder="At least 8 characters" required minlength="8">
      <small class="hint">Use at least 8 characters, including a number.</small>
    </div>

    <div class="field">
      <label for="dob">Date of birth</label>
      <input type="date" id="dob" name="dob" required>
    </div>
  </fieldset>

  <fieldset>
    <legend>Profile</legend>

    <div class="field">
      <span id="genderLabel">Gender</span>
      <div class="radio-group" role="radiogroup" aria-labelledby="genderLabel">
        <label><input type="radio" name="gender" value="female" required> Female</label>
        <label><input type="radio" name="gender" value="male"> Male</label>
        <label><input type="radio" name="gender" value="other"> Other / Prefer not to say</label>
      </div>
    </div>

    <div class="field">
      <label for="country">Country</label>
      <select id="country" name="country" required>
        <option value="" disabled selected>Select your country</option>
        <option value="in">India</option>
        <option value="us">United States</option>
        <option value="uk">United Kingdom</option>
        <option value="ca">Canada</option>
        <option value="au">Australia</option>
        <option value="other">Other</option>
      </select>
    </div>

    <div class="field">
      <label for="bio">Short bio</label>
      <textarea id="bio" name="bio" placeholder="Tell us a little about yourself"></textarea>
    </div>

    <div class="field">
      <label for="avatar">Profile picture</label>
      <input type="file" id="avatar" name="avatar" accept="image/*">
    </div>
  </fieldset>

  <fieldset>
    <legend>Preferences</legend>
    <div class="checkbox-group">
      <label><input type="checkbox" name="newsletter" value="yes"> Subscribe to the newsletter</label>
      <label><input type="checkbox" name="terms" required> I agree to the Terms &amp; Conditions</label>
    </div>
  </fieldset>

  <button type="submit">Register</button>
  <p id="formStatus"></p>
</form>

<script>
  const form = document.getElementById('registrationForm');
  const status = document.getElementById('formStatus');

  form.addEventListener('submit', function (e) {
    e.preventDefault();
    if (form.checkValidity()) {
      status.textContent = 'Form is valid — ready to submit!';
    } else {
      form.reportValidity();
      status.textContent = '';
    }
  });
</script>

</body>
</html>
