<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexbox: flex-wrap, align-content and gap, row-gap, column-gap</title>
    <style>
        .container{
            display: flex;
            border: 2px solid black;
            padding: 10px;
            height: 300px;
            gap: 10px;
            flex-wrap: wrap; /* wrap | nowrap | wrap-reverse */
            align-content: space-around; /* flex-start | flex-end | center | space-between | space-around | stretch(default) */
           }
        .item{
            background-color: rgb(160, 225, 6);
            padding: 15px;
            min-width: 150px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="item">Item 1</div>
        <div class="item">Item 2</div>
        <div class="item">Item 3</div>
        <div class="item">Item 4</div>
        <div class="item">Item 5</div>
        <div class="item">Item 6</div>
        <div class="item">Item 7</div>
        <div class="item">Item 8</div>
        <div class="item">Item 9</div>
    </div>
</body>
</html>
