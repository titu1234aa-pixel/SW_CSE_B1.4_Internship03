<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexbox: flex-item</title>
    <style>
       .nav{
        display: flex;
        justify-content: space-between;
        align-items: center;
        background-color: burlywood;
        padding: 10px 20px;
        color: crimson;
       }
       .nav-links{
            display: flex;
            gap: 16px;
            list-style: none;
       }
       .nav-links a{
        color: chocolate;
        text-decoration: none;
       }
       .nav-links a:hover{
        text-decoration: underline;
        color: black;
       }

    </style>
</head>
<body>
    <p>
        flex-item properties:
        flex-grow
        flex-shrink
        flex-basis
        flex shorthand
        align-self
        order

        Flexbox patterns:
        1. Center a both horizontally & vertically
        2. Simple navigation bar
        3. Responsive card layout
        4. Two-column layout (sidebar + main)
    </p>
    <nav class="nav">
        <ul class="nav-links">
            <li><a href="#">Home</a></li>
            <li><a href="#">About</a></li>
            <li><a href="#">Contact</a></li>
        </ul>
    </nav>
</body>
</html>
