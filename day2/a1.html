<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image tags</title>
    <style>
        .responsive-image {
            max-width: 100%;
            height: auto;
            display: block;
        }
    </style>
</head>
<body>
    <!-- src: source alt: alternate text | Self-closing tag -->

    <!-- Common attributes & variations -->

    <!-- Width & height -->
    <img src="cat.jpeg" alt="Could not find the image" width="200px" height="100px">

    <!-- Tooltip -->
    <img src="cat.jpeg" alt="Could not find the image" title="Image of a Cat">

    <!-- Style -->
    <img src="cat.jpeg" alt="Could not find the image"
         style="width:200px; height:100px; border-radius:10%; border:2px solid #cd2323;">

    <!-- Image formats -->
    <!-- 1.JPG 2.PNG 3.GIF 4.SVG 5.WEBP -->

    <!-- Responsive image via CSS -->
    <img src="cat.jpeg" alt="Could not find the image" class="responsive-image">

</body>
</html>
