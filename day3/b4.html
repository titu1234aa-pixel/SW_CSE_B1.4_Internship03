<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Tag</title>
</head>
<body>

    <p>Video Tag</p>

    <!-- MP4 Video -->
    <video src="sample-5s.mp4" controls>
        Your browser does not support the video tag.
    </video>

    <br><br>

    <!-- Second Video -->
    <video src="sample-5s.mp4" controls>
        Your browser does not support the video tag.
   video tag</video>
    <!-- W/o controls the video appears but the user cannot play it. 
     JavaScript can start playing the video -->

    <!-- Width & Height  -->
    <video src="sample-5s-360p.mp4" width="880" height="520" controls>
        Your browser does not support the video tag
    </video>

    <!-- autoplay -->
    <video src="sample-5s-360p.mp4" width="880" height="520" autoplay controls>
        Your browser does not support the video tag
    </video>
</body>
</html>
